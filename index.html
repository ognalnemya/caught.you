<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow // Checklist</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0d0e12',
                        cardBg: '#161820',
                        accentPurp: '#6366f1',
                        accentCyan: '#06b6d4'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d0e12; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #161820; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2e3344; border-radius: 3px; }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex items-center justify-center p-4 sm:p-6">

    <div class="w-full max-w-lg bg-cardBg rounded-2xl border border-gray-800 shadow-2xl overflow-hidden flex flex-col h-[640px]">
        
        <!-- Header Zone -->
        <div class="p-6 border-b border-gray-800 bg-gradient-to-r from-cardBg to-gray-900 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">FocusFlow</h1>
                <p class="text-xs text-gray-400 mt-1" id="progress-text">0 of 0 metrics completed</p>
            </div>
            <!-- Dynamic Circular Progress Gauge -->
            <div class="relative w-12 h-12 flex items-center justify-center">
                <svg class="w-full h-full transform -rotate-90">
                    <circle cx="24" cy="24" r="20" stroke="#2e3344" stroke-width="3" fill="transparent" />
                    <circle id="progress-circle" cx="24" cy="24" r="20" stroke="url(#accent-grad)" stroke-width="4" fill="transparent" 
                        stroke-linecap="round" stroke-dasharray="125.6" stroke-dashoffset="125.6" class="transition-all duration-500 ease-out" />
                    <defs>
                        <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#6366f1" />
                            <stop offset="100%" stop-color="#06b6d4" />
                        </linearGradient>
                    </defs>
                </svg>
                <span id="progress-percentage" class="absolute text-[10px] font-mono font-bold text-cyan-400">0%</span>
            </div>
        </div>

        <!-- Input Section -->
        <form id="todo-form" class="p-4 bg-gray-900/50 border-b border-gray-800 flex gap-2">
            <div class="flex-1 flex gap-1 bg-darkBg border border-gray-800 rounded-xl px-3 items-center focus-within:border-indigo-500 transition-colors">
                <input type="text" id="todo-input" placeholder="Append structural target..." required
                    class="bg-transparent text-sm w-full py-2.5 focus:outline-none text-gray-200 placeholder-gray-500">
                
                <!-- Category Select Tag -->
                <select id="todo-category" class="bg-gray-900 text-xs text-gray-400 rounded px-2 py-1 border border-gray-800 focus:outline-none cursor-pointer">
                    <option value="Dev">Dev</option>
                    <option value="Biz">Biz</option>
                    <option value="Life">Life</option>
                </select>
            </div>
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 rounded-xl text-sm font-medium transition-all flex items-center justify-center active:scale-95 shadow-lg shadow-indigo-600/10">
                +
            </button>
        </form>

        <!-- Main Checklist Area -->
        <div id="todo-list" class="flex-1 overflow-y-auto p-4 space-y-2.5 custom-scrollbar">
            <!-- Items injected via JavaScript dynamically -->
        </div>

        <!-- Control Action Bar -->
        <div class="p-4 border-t border-gray-800 bg-gray-900/30 flex justify-between items-center text-xs text-gray-500">
            <div class="flex gap-2" id="filter-controls">
                <button data-filter="all" class="text-indigo-400 font-semibold px-2 py-0.5 rounded bg-indigo-500/10">All</button>
                <button data-filter="active" class="hover:text-gray-300 px-2 py-0.5 transition-colors">Active</button>
                <button data-filter="completed" class="hover:text-gray-300 px-2 py-0.5 transition-colors">Completed</button>
            </div>
            <button id="clear-completed" class="hover:text-red-400 transition-colors">Purge Completed</button>
        </div>
    </div>

    <!-- Application Script -->
    <script>
        let todos = JSON.parse(localStorage.getItem('focusflow_todos')) || [
            { id: 1, text: "Configure architecture pattern", category: "Dev", completed: false },
            { id: 2, text: "Refine landing page funnel blueprint", category: "Biz", completed: true },
            { id: 3, text: "High-intensity technical drilling session", category: "Life", completed: false }
        ];
        
        let currentFilter = 'all';

        const form = document.getElementById('todo-form');
        const input = document.getElementById('todo-input');
        const categorySelect = document.getElementById('todo-category');
        const listContainer = document.getElementById('todo-list');
        const filterButtons = document.querySelectorAll('#filter-controls button');
        const clearBtn = document.getElementById('clear-completed');

        // Color mapper for categorical indicators
        const categoryColors = {
            Dev: 'bg-cyan-500/10 text-cyan-400 border-cyan-500/20',
            Biz: 'bg-amber-500/10 text-amber-400 border-amber-500/20',
            Life: 'bg-purple-500/10 text-purple-400 border-purple-500/20'
        };

        function saveToStorage() {
            localStorage.setItem('focusflow_todos', JSON.stringify(todos));
        }

        function updateMetrics() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);

            document.getElementById('progress-text').innerText = `${completed} of ${total} metrics completed`;
            document.getElementById('progress-percentage').innerText = `${percentage}%`;

            // SVG circle dasharray calculation (radius is 20, perimeter is 2 * pi * r ≈ 125.6)
            const circle = document.getElementById('progress-circle');
            const offset = 125.6 - (125.6 * percentage) / 100;
            circle.style.strokeDashoffset = offset;
        }

        function render() {
            listContainer.innerHTML = '';
            
            const filteredTodos = todos.filter(todo => {
                if (currentFilter === 'active') return !todo.completed;
                if (currentFilter === 'completed') return todo.completed;
                return true;
            });

            if (filteredTodos.length === 0) {
                listContainer.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-center p-8 opacity-40">
                        <p class="text-sm font-medium text-gray-400">No operations pending execution.</p>
                    </div>`;
                updateMetrics();
                return;
            }

            filteredTodos.forEach(todo => {
                const item = document.createElement('div');
                item.className = `flex items-center justify-between p-3.5 bg-darkBg border rounded-xl transition-all duration-200 group ${todo.completed ? 'border-gray-800/60 opacity-50' : 'border-gray-800 hover:border-gray-700'}`;
                
                item.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <div class="relative flex items-center justify-center cursor-pointer" onclick="toggleTodo(${todo.id})">
                            <input type="checkbox" ${todo.completed ? 'checked' : ''} 
                                class="sr-only peer">
                            <div class="w-5 h-5 rounded-md border-2 border-gray-600 bg-transparent peer-checked:bg-indigo-600 peer-checked:border-indigo-600 transition-all flex items-center justify-center">
                                <svg class="w-3 h-3 text-white fill-none stroke-current stroke-2 opacity-0 peer-checked:opacity-100 transition-opacity" viewBox="0 0 24 24">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </div>
                        </div>
                        <span class="text-sm text-gray-300 break-words flex-1 cursor-pointer select-none ${todo.completed ? 'line-through text-gray-500' : ''}" onclick="toggleTodo(${todo.id})">
                            ${todo.text}
                        </span>
                    </div>
                    <div class="flex items-center gap-2.5 ml-2">
                        <span class="text-[10px] font-semibold tracking-wider uppercase px-2 py-0.5 rounded border ${categoryColors[todo.category] || 'bg-gray-800 text-gray-400'}">
                            ${todo.category}
                        </span>
                        <button onclick="deleteTodo(${todo.id})" class="text-gray-600 hover:text-red-400 p-1 rounded opacity-0 group-hover:opacity-100 transition-all focus:opacity-100">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </button>
                    </div>
                `;
                listContainer.appendChild(item);
            });

            updateMetrics();
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = input.value.trim();
            const category = categorySelect.value;
            if (!text) return;

            todos.push({
                id: Date.now(),
                text: text,
                category: category,
                completed: false
            });

            input.value = '';
            saveToStorage();
            render();
        });

        window.toggleTodo = function(id) {
            todos = todos.map(todo => todo.id === id ? { ...todo, completed: !todo.completed } : todo);
            saveToStorage();
            render();
        };

        window.deleteTodo = function(id) {
            todos = todos.filter(todo => todo.id !== id);
            saveToStorage();
            render();
        };

        clearBtn.addEventListener('click', () => {
            todos = todos.filter(todo => !todo.completed);
            saveToStorage();
            render();
        });

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.className = 'hover:text-gray-300 px-2 py-0.5 transition-colors');
                btn.className = 'text-indigo-400 font-semibold px-2 py-0.5 rounded bg-indigo-500/10';
                currentFilter = btn.getAttribute('data-filter');
                render();
            });
        });

        // Initialize display
        render();
    </script>
</body>
</html>
