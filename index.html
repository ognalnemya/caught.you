<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caught You.</title>
    <style>
        :root { 
             
            /* The image URL below can be swapped for any image you want. 
               Use an HTTPS link or a relative path to an image file in the same folder. */
            --bg-image: url(./IMG_1438.jpeg);
            --bg-color-overlay: rgba(5, 5, 5, 0.85); /* Controls how dark the image gets */
            --accent-color: #ff3333;
            --text-color: #ffffff;
            --glow-color: rgba(255, 51, 51, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            background-color: #050505; /* Fallback color */
        }

        /* The dynamic, blurry background layer */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            z-index: 1;
            /* Optional: You can remove the filter line if your source image is already dark/blurry */
            /* filter: blur(5px) grayscale(50%); */
        }

        /* The overlay that makes the text readable over the image */
        body::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color-overlay);
            z-index: 2;
        }

        .container {
            position: relative; /* Must be relative to sit above body pseudos */
            text-align: center;
            z-index: 3;
            padding: 20px;
            /* Creates a slight "glass" effect for the container itself */
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out; /* For mouse parallax */
        }

        .eye-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            fill: none;
            stroke: var(--accent-color);
            stroke-width: 1.5;
            filter: drop-shadow(0 0 8px var(--glow-color));
            animation: pulse 3s infinite ease-in-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s;
        }

        p {
            font-size: 1rem;
            font-weight: 400;
            color: #ccc; /* Slightly brighter for visibility */
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.4s;
        }

        /* Interactive Tracker Info */
        .tracker-info {
            margin-top: 40px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #666; /* Brighter for readability */
            opacity: 0;
            animation: fadeIn 1.5s ease forward 1s;
            animation-fill-mode: forwards;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 8px var(--glow-color)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 15px var(--accent-color)); }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <svg class="eye-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
        </svg>

        <h1>I see u</h1>
        <p>stalker</p>

        <div class="tracker-info" id="tracker">
            TARGET LOCATED // LATENCY: <span id="ping">--</span>ms
        </div>
    </div>

    <script>
        // Generates a realistic fluctuating low ping for psychological effect
        setInterval(() => {
            const ping = Math.floor(Math.random() * (42 - 12 + 1)) + 12;
            document.getElementById('ping').innerText = ping;
        }, 1500);

        // Subtly tilts the central container based on mouse position
        document.addEventListener('mousemove', (e) => {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const dx = (e.clientX - cx) / cx; // Value from -1 to 1
            const dy = (e.clientY - cy) / cy; // Value from -1 to 1
            
            // Adjust the multiplier (e.g., 8) to increase/decrease tilt sensitivity
            document.querySelector('.container').style.transform = 
                `rotateX(${-dy * 8}deg) rotateY(${dx * 8}deg) translateZ(10px)`;
        });
    </script>
</body>
</html>
